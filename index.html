<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DKAP Assists · Your AI Companion</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<script src="https://js.puter.com/v2/"></script>
<style>
:root {
  --bg:         #07070f;
  --glass:      rgba(255,255,255,0.04);
  --glass-b:    rgba(255,255,255,0.07);
  --violet:     #7c3aed;
  --violet-l:   #a78bfa;
  --cyan:       #06b6d4;
  --cyan-l:     #67e8f9;
  --pink:       #ec4899;
  --pink-l:     #f9a8d4;
  --green:      #10b981;
  --green-l:    #6ee7b7;
  --text:       #e2e8f0;
  --text-dim:   #94a3b8;
  --text-faint: #475569;
  --border:     rgba(255,255,255,0.08);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
}

/* BACKGROUND */
.bg-canvas { position:fixed; inset:0; z-index:0; overflow:hidden; pointer-events:none; }
.orb { position:absolute; border-radius:50%; filter:blur(90px); opacity:0.15; animation:drift 20s ease-in-out infinite alternate; }
.orb-1 { width:600px; height:600px; background:var(--violet); top:-180px; left:-150px; animation-duration:22s; }
.orb-2 { width:450px; height:450px; background:var(--cyan);   bottom:-120px; right:-120px; animation-duration:26s; animation-delay:-9s; }
.orb-3 { width:350px; height:350px; background:var(--pink);   top:45%; left:55%; animation-duration:18s; animation-delay:-5s; }
.orb-4 { width:250px; height:250px; background:#f59e0b; top:20%; right:20%; opacity:0.07; animation-duration:24s; animation-delay:-12s; }
@keyframes drift {
  from { transform:translate(0,0) scale(1); }
  to   { transform:translate(50px,35px) scale(1.08); }
}
.bg-canvas::before {
  content:''; position:absolute; inset:0;
  background-image:
    linear-gradient(rgba(124,58,237,0.035) 1px, transparent 1px),
    linear-gradient(90deg,rgba(124,58,237,0.035) 1px, transparent 1px);
  background-size:55px 55px;
}

/* LAYOUT */
#app { position:relative; z-index:1; display:flex; flex-direction:column; height:100vh; max-width:940px; margin:0 auto; padding:0 20px; }

/* HEADER */
header {
  display:flex; align-items:center; justify-content:space-between;
  padding:16px 0 13px;
  border-bottom:1px solid var(--border);
  flex-shrink:0; gap:12px; flex-wrap:wrap;
}
.brand { display:flex; align-items:center; gap:13px; }
.brand-icon {
  width:46px; height:46px; border-radius:14px; flex-shrink:0;
  background:linear-gradient(135deg, var(--violet), var(--cyan));
  display:flex; align-items:center; justify-content:center; font-size:21px;
  box-shadow:0 0 0 1px rgba(124,58,237,0.4), 0 0 28px rgba(124,58,237,0.45);
  animation:icon-glow 4s ease-in-out infinite;
}
@keyframes icon-glow {
  0%,100%{ box-shadow:0 0 0 1px rgba(124,58,237,0.4), 0 0 28px rgba(124,58,237,0.4); }
  50%    { box-shadow:0 0 0 1px rgba(6,182,212,0.55), 0 0 50px rgba(6,182,212,0.4); }
}
.brand-name {
  font-family:'Syne',sans-serif; font-weight:800; font-size:1.4rem;
  background:linear-gradient(90deg, var(--violet-l), var(--cyan-l), var(--pink-l));
  background-size:200% auto; -webkit-background-clip:text;
  -webkit-text-fill-color:transparent; background-clip:text;
  animation:shimmer 5s linear infinite;
}
@keyframes shimmer { to { background-position:200% center; } }
.brand-sub { font-size:0.67rem; color:var(--text-faint); letter-spacing:0.1em; text-transform:uppercase; margin-top:2px; }

.header-right { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }

.status-badge {
  display:flex; align-items:center; gap:6px;
  padding:5px 13px; border-radius:99px;
  background:rgba(16,185,129,0.1);
  border:1px solid rgba(16,185,129,0.25);
  font-size:0.7rem; font-weight:500; color:var(--green-l);
}
.status-dot { width:6px; height:6px; border-radius:50%; background:var(--green); box-shadow:0 0 8px var(--green); animation:blink 2.5s ease-in-out infinite; }
@keyframes blink { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.35;transform:scale(0.8)} }

.model-wrap { position:relative; }
.model-wrap::after { content:'▾'; position:absolute; right:9px; top:50%; transform:translateY(-50%); color:var(--text-faint); pointer-events:none; font-size:0.7rem; }
#model-selector {
  appearance:none; background:var(--glass-b); border:1px solid var(--border);
  color:var(--text); padding:7px 28px 7px 12px; border-radius:10px;
  font-family:'DM Sans',sans-serif; font-size:0.76rem; cursor:pointer; outline:none; max-width:210px;
  transition:border-color 0.2s, background 0.2s;
}
#model-selector:hover, #model-selector:focus { border-color:var(--violet); background:rgba(124,58,237,0.12); }
#model-selector option { background:#14122a; }

#voice-mode-btn {
  display:flex; align-items:center; gap:7px; padding:7px 14px; border-radius:10px;
  background:var(--glass-b); border:1px solid var(--border);
  color:var(--text-dim); font-family:'DM Sans',sans-serif; font-size:0.76rem;
  cursor:pointer; transition:all 0.25s; white-space:nowrap;
}
#voice-mode-btn:hover { border-color:var(--pink); color:var(--pink-l); background:rgba(236,72,153,0.1); }
#voice-mode-btn.active { background:rgba(236,72,153,0.18); border-color:var(--pink); color:var(--pink-l); animation:vglow 2s ease-in-out infinite; }
@keyframes vglow { 0%,100%{box-shadow:0 0 12px rgba(236,72,153,0.2)} 50%{box-shadow:0 0 30px rgba(236,72,153,0.5)} }

/* CHAT */
#chat-window {
  flex:1; overflow-y:auto; overflow-x:hidden;
  padding:28px 4px 14px; display:flex; flex-direction:column; gap:22px;
  scroll-behavior:smooth;
}
#chat-window::-webkit-scrollbar { width:3px; }
#chat-window::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.08); border-radius:99px; }

/* Welcome */
.welcome-card { margin:auto; text-align:center; padding:32px 20px; animation:fadeUp 0.6s cubic-bezier(0.34,1.56,0.64,1) both; }
.welcome-icon { width:76px; height:76px; border-radius:22px; margin:0 auto 20px; background:linear-gradient(135deg, var(--violet), var(--cyan)); display:flex; align-items:center; justify-content:center; font-size:34px; box-shadow:0 0 0 1px rgba(124,58,237,0.3), 0 20px 65px rgba(124,58,237,0.35); }
.welcome-card h2 { font-family:'Syne',sans-serif; font-size:1.9rem; font-weight:800; background:linear-gradient(120deg, var(--violet-l), var(--cyan-l), var(--pink-l)); background-size:200%; -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; animation:shimmer 4s linear infinite; margin-bottom:10px; }
.welcome-card p { color:var(--text-dim); font-size:0.91rem; margin-bottom:28px; line-height:1.65; }
.chips { display:flex; flex-wrap:wrap; gap:9px; justify-content:center; }
.chip { padding:9px 16px; border-radius:99px; background:var(--glass-b); border:1px solid var(--border); font-size:0.78rem; color:var(--text-dim); cursor:pointer; transition:all 0.2s; user-select:none; }
.chip:hover { border-color:var(--violet); color:var(--violet-l); transform:translateY(-2px); box-shadow:0 8px 22px rgba(124,58,237,0.22); }

/* Messages */
.msg-row { display:flex; gap:11px; align-items:flex-end; animation:fadeUp 0.35s cubic-bezier(0.34,1.56,0.64,1) both; }
.msg-row.user { flex-direction:row-reverse; }
@keyframes fadeUp { from{opacity:0;transform:translateY(20px) scale(0.95)} to{opacity:1;transform:translateY(0) scale(1)} }

.avatar { width:35px; height:35px; border-radius:11px; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:15px; font-weight:700; }
.avatar.ai-av  { background:linear-gradient(135deg, var(--violet), var(--cyan)); box-shadow:0 0 16px rgba(124,58,237,0.45); }
.avatar.user-av{ background:linear-gradient(135deg, var(--pink), #f97316); box-shadow:0 0 16px rgba(236,72,153,0.35); }

.bubble { max-width:74%; padding:13px 17px; border-radius:18px; line-height:1.7; font-size:0.9rem; word-break:break-word; position:relative; }
.msg-row.ai   .bubble { background:var(--glass-b); border:1px solid var(--border); border-bottom-left-radius:5px; backdrop-filter:blur(16px); }
.msg-row.user .bubble { background:linear-gradient(135deg,rgba(124,58,237,0.3),rgba(6,182,212,0.2)); border:1px solid rgba(124,58,237,0.28); border-bottom-right-radius:5px; }

.bubble-content { white-space:pre-wrap; }
.bubble-content code { background:rgba(0,0,0,0.35); border:1px solid var(--border); border-radius:5px; padding:1px 6px; font-family:'Courier New',monospace; font-size:0.82em; color:var(--violet-l); }
.bubble-content pre { background:rgba(0,0,0,0.45); border:1px solid var(--border); border-radius:10px; padding:13px 15px; overflow-x:auto; margin:8px 0; font-size:0.82em; line-height:1.5; }
.bubble-content pre code { background:none; border:none; padding:0; color:var(--cyan-l); }
.bubble-content em { color:var(--pink-l); font-style:italic; }
.bubble-content strong { color:var(--cyan-l); font-weight:600; }
.bubble img { max-width:100%; border-radius:10px; margin-top:10px; }

.msg-attachments { margin-top:9px; padding-top:8px; border-top:1px solid var(--border); font-size:0.73rem; color:var(--text-faint); display:flex; flex-wrap:wrap; gap:6px; align-items:center; }
.att-chip { display:inline-flex; align-items:center; gap:4px; background:rgba(124,58,237,0.12); border:1px solid rgba(124,58,237,0.25); padding:2px 8px; border-radius:99px; color:var(--violet-l); font-size:0.71rem; }

/* Typing dots */
.typing-dots { display:flex; gap:5px; align-items:center; padding:4px 0; }
.typing-dots span { width:7px; height:7px; border-radius:50%; display:block; animation:bounce 1.3s ease-in-out infinite; }
.typing-dots span:nth-child(1){ background:var(--violet-l); }
.typing-dots span:nth-child(2){ background:var(--cyan-l); animation-delay:0.18s; }
.typing-dots span:nth-child(3){ background:var(--pink-l); animation-delay:0.36s; }
@keyframes bounce { 0%,80%,100%{transform:translateY(0);opacity:0.5} 40%{transform:translateY(-9px);opacity:1} }

/* FOOTER */
footer { padding:10px 0 20px; flex-shrink:0; }
#file-previews { display:flex; gap:7px; margin-bottom:9px; flex-wrap:wrap; min-height:0; }
.preview-item { display:flex; align-items:center; gap:7px; padding:5px 12px; border-radius:99px; background:rgba(124,58,237,0.14); border:1px solid rgba(124,58,237,0.28); font-size:0.73rem; color:var(--violet-l); animation:fadeUp 0.2s both; }
.preview-item .remove { cursor:pointer; color:var(--pink); font-size:1.05rem; line-height:1; transition:transform 0.15s; }
.preview-item .remove:hover { transform:scale(1.35); }

.input-shell { display:flex; align-items:flex-end; gap:8px; background:var(--glass-b); border:1px solid var(--border); border-radius:19px; padding:10px 10px 10px 16px; transition:border-color 0.25s, box-shadow 0.25s; backdrop-filter:blur(16px); }
.input-shell:focus-within { border-color:rgba(124,58,237,0.5); box-shadow:0 0 0 3px rgba(124,58,237,0.1), 0 0 45px rgba(124,58,237,0.07); }

#user-input { flex:1; background:transparent; border:none; outline:none; color:var(--text); font-family:'DM Sans',sans-serif; font-size:0.92rem; resize:none; height:24px; max-height:190px; line-height:1.55; }
#user-input::placeholder { color:var(--text-faint); }

.action-strip { display:flex; align-items:center; gap:3px; }
.act-btn { width:37px; height:37px; border-radius:9px; background:transparent; border:1px solid transparent; color:var(--text-faint); font-size:15px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.18s; position:relative; flex-shrink:0; }
.act-btn:hover { background:var(--glass-b); border-color:var(--border); color:var(--text); transform:translateY(-1px); }
.act-btn[data-tip]::after { content:attr(data-tip); position:absolute; bottom:calc(100% + 8px); left:50%; transform:translateX(-50%); background:#1a1630; border:1px solid var(--border); color:var(--text-dim); font-family:'DM Sans',sans-serif; font-size:0.67rem; padding:4px 8px; border-radius:6px; white-space:nowrap; pointer-events:none; z-index:10; opacity:0; transition:opacity 0.15s; }
.act-btn[data-tip]:hover::after { opacity:1; }
.act-btn.active-rec { color:var(--pink); border-color:rgba(236,72,153,0.4); background:rgba(236,72,153,0.1); animation:pulse-ring 1s ease-in-out infinite; }
@keyframes pulse-ring { 0%,100%{box-shadow:0 0 0 0 rgba(236,72,153,0.45)} 50%{box-shadow:0 0 0 7px rgba(236,72,153,0)} }
.act-divider { width:1px; height:18px; background:var(--border); margin:0 2px; flex-shrink:0; }

#send-btn { width:43px; height:43px; border-radius:13px; flex-shrink:0; background:linear-gradient(135deg, var(--violet), #3b82f6); border:none; color:white; font-size:16px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.2s; box-shadow:0 4px 20px rgba(124,58,237,0.45); }
#send-btn:hover { transform:scale(1.09); box-shadow:0 6px 30px rgba(124,58,237,0.65); }
#send-btn:active { transform:scale(0.93); }
#send-btn svg { transition:transform 0.2s; }
#send-btn:hover svg { transform:translateX(2px) translateY(-2px); }

#general-file-input, #image-ocr-input { display:none; }

/* TOAST */
#toast-area { position:fixed; top:20px; right:20px; z-index:200; display:flex; flex-direction:column; gap:8px; }
.toast { padding:10px 18px; border-radius:10px; font-size:0.8rem; font-family:'DM Sans',sans-serif; backdrop-filter:blur(14px); pointer-events:none; animation:toastIn 0.3s cubic-bezier(0.34,1.56,0.64,1) both; max-width:280px; }
@keyframes toastIn { from{opacity:0;transform:translateX(26px)} to{opacity:1;transform:translateX(0)} }
.toast.success { background:rgba(16,185,129,0.18); border:1px solid rgba(16,185,129,0.35); color:var(--green-l); }
.toast.error   { background:rgba(239,68,68,0.18);  border:1px solid rgba(239,68,68,0.35);  color:#fca5a5; }
.toast.info    { background:rgba(124,58,237,0.18); border:1px solid rgba(124,58,237,0.35); color:var(--violet-l); }
.toast.warning { background:rgba(245,158,11,0.18); border:1px solid rgba(245,158,11,0.35); color:#fcd34d; }

* { scrollbar-width:thin; scrollbar-color:rgba(255,255,255,0.07) transparent; }
</style>
</head>
<body>

<div class="bg-canvas">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <div class="orb orb-4"></div>
</div>

<div id="toast-area"></div>

<div id="app">
  <header>
    <div class="brand">
      <div class="brand-icon">✦</div>
      <div>
        <div class="brand-name">DKAP Assists</div>
        <div class="brand-sub">Powered by Puter AI</div>
      </div>
    </div>
    <div class="header-right">
      <div class="status-badge"><span class="status-dot"></span> Online</div>
      <div class="model-wrap">
        <select id="model-selector"><option value="">Loading…</option></select>
      </div>
      <button id="voice-mode-btn">
        <span id="voice-icon">🎙️</span>
        <span id="voice-label">Voice Mode</span>
      </button>
    </div>
  </header>

  <div id="chat-window">
    <div class="welcome-card" id="welcome-card">
      <div class="welcome-icon">✦</div>
      <h2>Hey, I'm DKAP Assists!</h2>
      <p>Your vibrant AI companion — chat, analyse files, extract text<br>from images, and even talk with me using Voice Mode.</p>
      <div class="chips">
        <div class="chip" data-prompt="What can you do for me?">✨ What can you do?</div>
        <div class="chip" data-prompt="Write me a short poem about the cosmos.">🌌 Write a poem</div>
        <div class="chip" data-prompt="Give me 5 creative startup ideas for 2025.">💡 Startup ideas</div>
        <div class="chip" data-prompt="Explain quantum computing in simple terms.">⚛️ Explain quantum</div>
        <div class="chip" data-prompt="Help me write a professional email to reschedule a meeting.">✉️ Draft an email</div>
        <div class="chip" data-prompt="What are some tips to improve my productivity?">🚀 Productivity tips</div>
      </div>
    </div>
  </div>

  <footer>
    <div id="file-previews"></div>
    <div class="input-shell">
      <input type="file" id="general-file-input" multiple>
      <input type="file" id="image-ocr-input" accept="image/*">
      <textarea id="user-input" placeholder="Message DKAP Assists…" rows="1"></textarea>
      <div class="action-strip">
        <button class="act-btn" id="add-file-btn" data-tip="Attach files">📎</button>
        <button class="act-btn" id="ocr-btn" data-tip="Image → Text (OCR)">🖼️</button>
        <button class="act-btn" id="stt-btn" data-tip="Speak to type">🎤</button>
        <div class="act-divider"></div>
        <button id="send-btn" data-tip="Send">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
    </div>
  </footer>
</div>

<script>
// ═══════════════════════════════
//  STATE
// ═══════════════════════════════
let currentModel        = 'gpt-4o-mini';
let attachedPuterPaths  = [];
let isVoiceMode         = false;
let currentAudio        = null;
let mediaRecorder       = null;
let audioChunks         = [];
let isRecording         = false;
let isStreaming         = false;
let conversationHistory = [];

// ═══════════════════════════════
//  DOM
// ═══════════════════════════════
const dom = {
  chatWindow:   document.getElementById('chat-window'),
  userInput:    document.getElementById('user-input'),
  modelSel:     document.getElementById('model-selector'),
  sendBtn:      document.getElementById('send-btn'),
  fileInput:    document.getElementById('general-file-input'),
  addFileBtn:   document.getElementById('add-file-btn'),
  ocrInput:     document.getElementById('image-ocr-input'),
  ocrBtn:       document.getElementById('ocr-btn'),
  sttBtn:       document.getElementById('stt-btn'),
  voiceModeBtn: document.getElementById('voice-mode-btn'),
  voiceLabel:   document.getElementById('voice-label'),
  voiceIcon:    document.getElementById('voice-icon'),
  filePreviews: document.getElementById('file-previews'),
  welcomeCard:  document.getElementById('welcome-card'),
  toastArea:    document.getElementById('toast-area'),
};

// ═══════════════════════════════
//  INIT
// ═══════════════════════════════
(async function init() {
  bindEvents();
  await loadModels();
})();

function bindEvents() {
  dom.sendBtn.addEventListener('click', sendMessage);
  dom.userInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
  dom.userInput.addEventListener('input', autoResize);
  dom.modelSel.addEventListener('change', e => { currentModel = e.target.value; });
  dom.addFileBtn.addEventListener('click', () => dom.fileInput.click());
  dom.fileInput.addEventListener('change', handleFileUpload);
  dom.ocrBtn.addEventListener('click', () => dom.ocrInput.click());
  dom.ocrInput.addEventListener('change', handleOCR);
  dom.sttBtn.addEventListener('click', toggleSTT);
  dom.voiceModeBtn.addEventListener('click', toggleVoiceMode);
  document.querySelectorAll('.chip').forEach(chip => {
    chip.addEventListener('click', () => {
      dom.userInput.value = chip.dataset.prompt;
      autoResize();
      sendMessage();
    });
  });
}

function autoResize() {
  const el = dom.userInput;
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 190) + 'px';
}

// ═══════════════════════════════
//  LOAD MODELS
// ═══════════════════════════════
async function loadModels() {
  try {
    const models = await puter.ai.listModels();
    dom.modelSel.innerHTML = '';
    // Sort popular first
    const popular = ['gpt-4o-mini','gpt-4o','claude-sonnet-4-5','gemini-2.5-flash-lite','claude-opus-4-5'];
    models.sort((a,b) => {
      const ai = popular.indexOf(a.id), bi = popular.indexOf(b.id);
      if (ai > -1 && bi > -1) return ai - bi;
      if (ai > -1) return -1;
      if (bi > -1) return 1;
      return (a.name||a.id).localeCompare(b.name||b.id);
    });
    models.forEach(m => {
      const opt = document.createElement('option');
      opt.value = m.id;
      opt.textContent = (m.name || m.id) + (m.provider ? ` · ${m.provider}` : '');
      if (m.id === currentModel) opt.selected = true;
      dom.modelSel.appendChild(opt);
    });
    if (dom.modelSel.value) currentModel = dom.modelSel.value;
    toast('✦ Models ready', 'success');
  } catch(e) {
    dom.modelSel.innerHTML = '<option value="gpt-4o-mini">GPT-4o Mini</option>';
    toast('Could not fetch model list', 'warning');
  }
}

// ═══════════════════════════════
//  SEND MESSAGE
// ═══════════════════════════════
async function sendMessage() {
  const text = dom.userInput.value.trim();
  if ((!text && attachedPuterPaths.length === 0) || isStreaming) return;

  // Hide welcome
  if (dom.welcomeCard) dom.welcomeCard.style.display = 'none';

  // Reset UI
  dom.userInput.value = '';
  dom.userInput.style.height = '24px';
  const files = [...attachedPuterPaths];
  attachedPuterPaths = [];
  renderPreviews();

  // Show user bubble
  appendMsg('user', text, files);

  // Build content
  let content;
  if (files.length > 0) {
    content = [{ type:'text', text: text || 'Analyse these files.' }];
    files.forEach(p => content.push({ type:'file', puter_path:p }));
  } else {
    content = text;
  }

  // Update history
  conversationHistory.push({ role:'user', content });

  // Show typing
  const thinkingRow = appendTyping();
  isStreaming = true;
  dom.sendBtn.style.opacity = '0.5';

  try {
    const historySlice = conversationHistory.slice(-22);

    const stream = await puter.ai.chat(historySlice, {
      model: currentModel,
      stream: true
    });

    thinkingRow.remove();
    const { contentEl } = appendStreamBubble();
    let fullText = '';

    for await (const chunk of stream) {
      if (chunk?.text) {
        fullText += chunk.text;
        contentEl.innerHTML = formatMarkdown(fullText);
        dom.chatWindow.scrollTop = dom.chatWindow.scrollHeight;
      }
      // Gemini image models
      if (chunk?.image) {
        const img = document.createElement('img');
        img.src = chunk.image.image_url?.url || chunk.image;
        img.style.cssText = 'max-width:100%;border-radius:10px;margin-top:10px;display:block;';
        contentEl.appendChild(img);
      }
    }

    conversationHistory.push({ role:'assistant', content: fullText });
    if (isVoiceMode && fullText) await speakText(fullText);

  } catch(e) {
    thinkingRow.remove();
    appendMsg('ai', '⚠️ **Error:** ' + (e.message || 'Something went wrong.'));
    toast(e.message || 'AI error', 'error');
  } finally {
    isStreaming = false;
    dom.sendBtn.style.opacity = '1';
  }
}

// ═══════════════════════════════
//  FILE UPLOAD
// ═══════════════════════════════
async function handleFileUpload(e) {
  const files = e.target.files;
  if (!files.length) return;
  dom.addFileBtn.textContent = '⏳';
  try {
    const uploaded = await puter.fs.upload(files);
    const arr = Array.isArray(uploaded) ? uploaded : [uploaded];
    arr.forEach(f => attachedPuterPaths.push(f.path));
    renderPreviews();
    toast(`${arr.length} file(s) attached ✦`, 'success');
  } catch(err) {
    toast('Upload failed: ' + err.message, 'error');
  } finally {
    dom.addFileBtn.textContent = '📎';
    dom.fileInput.value = '';
  }
}

function renderPreviews() {
  dom.filePreviews.innerHTML = '';
  attachedPuterPaths.forEach((path, i) => {
    const name = path.split('/').pop();
    const div = document.createElement('div');
    div.className = 'preview-item';
    div.innerHTML = `<span>📄 ${name}</span><span class="remove" data-i="${i}">×</span>`;
    dom.filePreviews.appendChild(div);
  });
  dom.filePreviews.querySelectorAll('.remove').forEach(btn => {
    btn.addEventListener('click', e => {
      attachedPuterPaths.splice(+e.target.dataset.i, 1);
      renderPreviews();
    });
  });
}

// ═══════════════════════════════
//  OCR
// ═══════════════════════════════
async function handleOCR(e) {
  const file = e.target.files[0];
  if (!file) return;
  dom.ocrBtn.textContent = '⏳';
  toast('Reading image…', 'info');
  try {
    const result = await puter.ai.img2txt(file);
    if (result) {
      dom.userInput.value += (dom.userInput.value ? '\n\n' : '') + result;
      dom.userInput.dispatchEvent(new Event('input'));
      autoResize();
      toast('Text extracted successfully!', 'success');
    } else {
      toast('No text detected in image', 'warning');
    }
  } catch(err) {
    toast('OCR failed: ' + err.message, 'error');
  } finally {
    dom.ocrBtn.textContent = '🖼️';
    dom.ocrInput.value = '';
  }
}

// ═══════════════════════════════
//  SPEECH TO TEXT
// ═══════════════════════════════
async function toggleSTT() {
  if (isRecording) {
    mediaRecorder?.stop();
    return;
  }
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    mediaRecorder = new MediaRecorder(stream);
    audioChunks = [];
    mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
    mediaRecorder.onstop = async () => {
      const blob = new Blob(audioChunks, { type: 'audio/wav' });
      dom.sttBtn.textContent = '⏳';
      try {
        const result = await puter.ai.speech2txt(blob);
        const txt = typeof result === 'string' ? result : (result?.text || '');
        if (txt) {
          dom.userInput.value = txt;
          dom.userInput.dispatchEvent(new Event('input'));
          autoResize();
          toast('Voice captured!', 'success');
          if (isVoiceMode) sendMessage();
        }
      } catch(err) {
        toast('STT failed: ' + err.message, 'error');
      } finally {
        dom.sttBtn.textContent = '🎤';
        dom.sttBtn.classList.remove('active-rec');
        stream.getTracks().forEach(t => t.stop());
        isRecording = false;
      }
    };
    mediaRecorder.start();
    isRecording = true;
    dom.sttBtn.classList.add('active-rec');
    toast('Listening… tap mic again to stop', 'info');
  } catch {
    toast('Microphone access denied', 'error');
  }
}

// ═══════════════════════════════
//  TEXT TO SPEECH
// ═══════════════════════════════
async function speakText(text) {
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  // Strip markdown symbols, trim to 2800 chars
  const clean = text.replace(/[#*`>_~\[\]]/g, '').substring(0, 2800);
  try {
    dom.voiceLabel.textContent = 'Speaking…';
    currentAudio = await puter.ai.txt2speech(clean, {
      provider: 'openai', voice: 'nova', model: 'gpt-4o-mini-tts'
    });
    return new Promise(resolve => {
      currentAudio.onended = () => {
        dom.voiceLabel.textContent = 'Voice ON';
        currentAudio = null;
        resolve();
      };
      currentAudio.play();
    });
  } catch(e) {
    dom.voiceLabel.textContent = 'Voice ON';
    toast('TTS issue: ' + e.message, 'warning');
  }
}

// ═══════════════════════════════
//  VOICE MODE
// ═══════════════════════════════
function toggleVoiceMode() {
  isVoiceMode = !isVoiceMode;
  dom.voiceModeBtn.classList.toggle('active', isVoiceMode);
  if (isVoiceMode) {
    dom.voiceLabel.textContent = 'Voice ON';
    dom.voiceIcon.textContent = '🔊';
    toast('Voice Mode ON ✦', 'success');
    if (dom.welcomeCard) dom.welcomeCard.style.display = 'none';
    appendMsg('ai', '🎙️ **Voice Mode activated!** I\'ll speak every response. Tap 🎤 and start talking — I\'ll auto-send when you stop.');
  } else {
    dom.voiceLabel.textContent = 'Voice Mode';
    dom.voiceIcon.textContent = '🎙️';
    if (currentAudio) { currentAudio.pause(); currentAudio = null; }
    if (isRecording && mediaRecorder) mediaRecorder.stop();
    toast('Voice Mode OFF', 'info');
  }
}

// ═══════════════════════════════
//  DOM HELPERS
// ═══════════════════════════════
function appendMsg(role, text, files = []) {
  const isAI = role === 'ai';
  const row = document.createElement('div');
  row.className = `msg-row ${isAI ? 'ai' : 'user'}`;

  const av = document.createElement('div');
  av.className = `avatar ${isAI ? 'ai-av' : 'user-av'}`;
  av.textContent = isAI ? '✦' : '✿';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';

  const contentEl = document.createElement('div');
  contentEl.className = 'bubble-content';
  contentEl.innerHTML = formatMarkdown(text);
  bubble.appendChild(contentEl);

  if (files.length > 0) {
    const attDiv = document.createElement('div');
    attDiv.className = 'msg-attachments';
    attDiv.innerHTML = files.map(p => `<span class="att-chip">📄 ${p.split('/').pop()}</span>`).join('');
    bubble.appendChild(attDiv);
  }

  row.appendChild(av);
  row.appendChild(bubble);
  dom.chatWindow.appendChild(row);
  dom.chatWindow.scrollTop = dom.chatWindow.scrollHeight;
  return row;
}

function appendTyping() {
  const row = document.createElement('div');
  row.className = 'msg-row ai';
  const av = document.createElement('div');
  av.className = 'avatar ai-av'; av.textContent = '✦';
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';
  row.appendChild(av); row.appendChild(bubble);
  dom.chatWindow.appendChild(row);
  dom.chatWindow.scrollTop = dom.chatWindow.scrollHeight;
  return row;
}

function appendStreamBubble() {
  const row = document.createElement('div');
  row.className = 'msg-row ai';
  const av = document.createElement('div');
  av.className = 'avatar ai-av'; av.textContent = '✦';
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  const contentEl = document.createElement('div');
  contentEl.className = 'bubble-content';
  bubble.appendChild(contentEl);
  row.appendChild(av); row.appendChild(bubble);
  dom.chatWindow.appendChild(row);
  dom.chatWindow.scrollTop = dom.chatWindow.scrollHeight;
  return { row, contentEl };
}

// Minimal markdown → HTML
function formatMarkdown(text) {
  if (!text) return '';
  return text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
    .replace(/`([^`\n]+)`/g, '<code>$1</code>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*([^*\n]+)\*/g, '<em>$1</em>')
    .replace(/^### (.+)$/gm, '<div style="font-family:Syne,sans-serif;font-weight:700;color:var(--cyan-l);margin:10px 0 4px;font-size:1em">$1</div>')
    .replace(/^## (.+)$/gm,  '<div style="font-family:Syne,sans-serif;font-weight:700;color:var(--violet-l);margin:12px 0 5px;font-size:1.1em">$1</div>')
    .replace(/^# (.+)$/gm,   '<div style="font-family:Syne,sans-serif;font-weight:800;color:var(--pink-l);margin:12px 0 6px;font-size:1.2em">$1</div>')
    .replace(/^[-•] (.+)$/gm,'<div style="padding-left:16px;margin:2px 0">• $1</div>')
    .replace(/^(\d+)\. (.+)$/gm,'<div style="padding-left:16px;margin:2px 0">$1. $2</div>')
    .replace(/\n/g,'<br>');
}

// ═══════════════════════════════
//  TOAST
// ═══════════════════════════════
function toast(msg, type='info') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  dom.toastArea.appendChild(el);
  setTimeout(() => { el.style.opacity = '0'; el.style.transform = 'translateX(20px)'; el.style.transition = '0.3s'; }, 2900);
  setTimeout(() => el.remove(), 3250);
}
</script>
